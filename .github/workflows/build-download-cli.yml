name: build-download-cli

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # Use Node.js 24 for actions before the forced migration on 2026-06-02.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  API_BASE: ${{ secrets.API_BASE }}

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            ext: ""
            os_build_type: linux-amd64
          - goos: linux
            goarch: arm64
            ext: ""
            os_build_type: linux-arm64
          - goos: darwin
            goarch: amd64
            ext: ""
            os_build_type: darwin-amd64
          - goos: darwin
            goarch: arm64
            ext: ""
            os_build_type: darwin-arm64
          - goos: windows
            goarch: amd64
            ext: ".exe"
            os_build_type: windows-amd64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true

      - name: Test
        run: go test ./...

      - name: Build CLI
        # DOWNLOADER_API_ENDPOINT must be set as a repository secret.
        # test -n ensures the build fails immediately when the secret is absent
        # rather than producing a binary with an empty endpoint.
        # The endpoint is base64-encoded before injection so it does not appear
        # as a plain ASCII string in the compiled binary (SEC-003).
        env:
          DOWNLOADER_API_ENDPOINT: ${{ secrets.DOWNLOADER_API_ENDPOINT }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          test -n "$DOWNLOADER_API_ENDPOINT"

          VERSION="$(date -u +%Y.%m.%d).${{ github.run_number }}"
          COMMIT="${GITHUB_SHA::8}"
          BUILD_DATE="$(date -u +%Y-%m-%d)"
          MODULE="github.com/mjudcd-ct-r-d-labeling/labeling_download_cli"
          ENDPOINT_B64="$(printf '%s' "$DOWNLOADER_API_ENDPOINT" | base64 -w 0)"

          mkdir -p dist
          go build \
            -trimpath \
            -ldflags "-s -w \
              -X '${MODULE}/internal/build.endpointB64=${ENDPOINT_B64}' \
              -X '${MODULE}/internal/version.Version=${VERSION}' \
              -X '${MODULE}/internal/version.Commit=${COMMIT}' \
              -X '${MODULE}/internal/version.BuildDate=${BUILD_DATE}'" \
            -o "dist/mju-dataset-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}" \
            ./cmd/mju-dataset

      - name: Verify endpoint is not in binary
        # Confirm the raw endpoint URL does not appear as plain text (SEC-003).
        # Since the endpoint is stored base64-encoded, strings(1) should not find it.
        env:
          DOWNLOADER_API_ENDPOINT: ${{ secrets.DOWNLOADER_API_ENDPOINT }}
        run: |
          BINARY="dist/mju-dataset-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          if strings "$BINARY" | grep -qF "$DOWNLOADER_API_ENDPOINT" 2>/dev/null; then
            echo "::error::Endpoint is visible as plain text in the binary. Build failed (SEC-003)."
            exit 1
          fi

      - name: Upload to release server
        env:
          CLI_RELEASE_PUBLISH_TOKEN: ${{ secrets.CLI_RELEASE_PUBLISH_TOKEN }}
        run: |
          test -n "$CLI_RELEASE_PUBLISH_TOKEN"
          test -n "$API_BASE"

          BINARY="dist/mju-dataset-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          FILE_NAME="mju-dataset-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}"
          OS_BUILD_TYPE="${{ matrix.os_build_type }}"
          VERSION="$(date -u +%Y.%m.%d).${{ github.run_number }}"

          SHA256=$(sha256sum "$BINARY" | awk '{print $1}')
          FILE_SIZE=$(stat -c%s "$BINARY")
          RELEASE_NOTES="Build: ${GITHUB_SHA::8} ($(date -u +%Y-%m-%d))"

          echo "Uploading ${FILE_NAME} as ${OS_BUILD_TYPE} v${VERSION}..."
          HTTP_STATUS=$(curl -s -o /tmp/chunk_resp.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $CLI_RELEASE_PUBLISH_TOKEN" \
            -F "os_build_type=${OS_BUILD_TYPE}" \
            -F "version=${VERSION}" \
            -F "commit_sha=${GITHUB_SHA}" \
            -F "sha256=${SHA256}" \
            -F "file_size=${FILE_SIZE}" \
            -F "file_name=${FILE_NAME}" \
            -F "chunk_index=0" \
            -F "total_chunks=1" \
            -F "release_notes=${RELEASE_NOTES}" \
            -F "chunk=@${BINARY}" \
            "${API_BASE}/admin/cli-releases/chunks")

          echo "Chunk upload HTTP ${HTTP_STATUS}: $(cat /tmp/chunk_resp.json)"
          if [[ "$HTTP_STATUS" != "200" && "$HTTP_STATUS" != "201" ]]; then
            echo "::error::Chunk upload failed (HTTP ${HTTP_STATUS})"
            exit 1
          fi

          echo "Completing upload..."
          HTTP_STATUS=$(curl -s -o /tmp/complete_resp.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $CLI_RELEASE_PUBLISH_TOKEN" \
            -F "os_build_type=${OS_BUILD_TYPE}" \
            -F "version=${VERSION}" \
            "${API_BASE}/admin/cli-releases/complete")

          echo "Complete HTTP ${HTTP_STATUS}: $(cat /tmp/complete_resp.json)"
          if [[ "$HTTP_STATUS" != "200" && "$HTTP_STATUS" != "201" ]]; then
            echo "::error::Upload complete failed (HTTP ${HTTP_STATUS})"
            exit 1
          fi

          echo "Successfully uploaded ${OS_BUILD_TYPE} v${VERSION}"

  summary:
    name: Show install commands
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Print install commands
        run: |
          VERSION="$(date -u +%Y.%m.%d).${{ github.run_number }}"

          SCRIPT_BASE="https://raw.githubusercontent.com/mjudcd-ct-r-d-labeling/labeling_download_cli/main/scripts"

          {
            echo "## mju-dataset v${VERSION} — Install Commands"
            echo ""
            echo "### Linux / macOS"
            echo '```sh'
            echo "curl -fsSL ${SCRIPT_BASE}/install.sh | sh -s -- ${VERSION}"
            echo '```'
            echo ""
            echo "### Windows (PowerShell)"
            echo '```powershell'
            echo "& ([scriptblock]::Create((irm '${SCRIPT_BASE}/install.ps1'))) -Version '${VERSION}'"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          echo ""
          echo "=== mju-dataset v${VERSION} build completed ==="
          echo "Linux/macOS : curl -fsSL ${SCRIPT_BASE}/install.sh | sh -s -- ${VERSION}"
          echo "Windows     : & ([scriptblock]::Create((irm '${SCRIPT_BASE}/install.ps1'))) -Version '${VERSION}'"

  tag:
    name: Create release tag
    needs: [build, summary]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Push version tag
        run: |
          VERSION="$(date -u +%Y.%m.%d).${{ github.run_number }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin "$VERSION"
          echo "Tagged ${VERSION}"
